services:
  server:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ../data:/workspace/data
      - /workspace/node_modules
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm dev:apps"
    environment:
      PORT: 3000
      CI: 'true'
      PNPM_STORE_DIR: /root/.pnpm-store
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || exit 1',
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
