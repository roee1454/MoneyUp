services:
  ai-service:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm start ai-service"
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      CI: 'true'
      PNPM_STORE_DIR: /root/.pnpm-store
    expose:
      - '3001'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 3001']
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  scraper-service:
    build:
      context: ..
      dockerfile: apps/scraper/Dockerfile
    shm_size: '1gb'
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      CI: 'true'
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    expose:
      - '3002'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 3002']
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  auth-service:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm start auth-service"
    environment:
      HOST: 0.0.0.0
      PORT: 3003
      CI: 'true'
      PNPM_STORE_DIR: /root/.pnpm-store
    expose:
      - '3003'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 3003']
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  users-service:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ../data:/workspace/data
      - /workspace/node_modules
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm start users-service"
    environment:
      HOST: 0.0.0.0
      PORT: 3004
      CI: 'true'
      PNPM_STORE_DIR: /root/.pnpm-store
    expose:
      - '3004'
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 3004']
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  gateway:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm start gateway"
    environment:
      PORT: 3000
      AI_SERVICE_HOST: ai-service
      AI_SERVICE_PORT: 3001
      SCRAPER_SERVICE_HOST: scraper-service
      SCRAPER_SERVICE_PORT: 3002
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 3003
      USERS_SERVICE_HOST: users-service
      USERS_SERVICE_PORT: 3004
      CI: 'true'
      PNPM_STORE_DIR: /root/.pnpm-store
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || exit 1',
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      ai-service:
        condition: service_healthy
      scraper-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
