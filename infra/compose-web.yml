services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runner
    command: node dist/apps/server/main
    volumes:
      - users-db-data:/workspace/data
    environment:
      PORT: 3000
      CLIENT_URL: http://web:5173
      CI: 'true'
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || exit 1',
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runner
    command: sh -c "cd /workspace/apps/web && pnpm dev --host"
    environment:
      CI: 'true'
    ports:
      - '5173:5173'
    depends_on:
      server:
        condition: service_healthy

volumes:
  users-db-data:
